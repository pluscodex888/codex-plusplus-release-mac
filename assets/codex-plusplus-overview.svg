<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Mac 版 codex汉化增强版能力概览">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.52" stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#f4fff8"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#102033"/>
      <stop offset="1" stop-color="#0b1424"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="36" fill="url(#page)"/>
  <rect x="64" y="58" width="1072" height="444" rx="30" fill="#ffffff" filter="url(#softShadow)"/>

  <rect x="64" y="58" width="286" height="444" rx="30" fill="url(#side)"/>
  <circle cx="104" cy="96" r="7" fill="#ef4444" opacity="0.9"/>
  <circle cx="128" cy="96" r="7" fill="#f59e0b" opacity="0.9"/>
  <circle cx="152" cy="96" r="7" fill="#22c55e" opacity="0.9"/>

  <text x="104" y="160" fill="#ffffff" font-size="28" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="800">codex汉化增强版</text>
  <text x="104" y="196" fill="#b9c8dd" font-size="15" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">Mac 中文界面 · 模型接入 · 小白工具箱</text>

  <rect x="104" y="236" width="176" height="48" rx="13" fill="url(#blue)"/>
  <text x="132" y="267" fill="#ffffff" font-size="17" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="800">Mac Codex 增强</text>

  <g fill="#e5efff" font-size="15" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="650">
    <text x="104" y="326">✓ 菜单与设置中文化</text>
    <text x="104" y="358">✓ DeepSeek / 千问 / 智谱</text>
    <text x="104" y="390">✓ 多账号额度与切换</text>
    <text x="104" y="422">✓ Mac 专用热更新通道</text>
  </g>

  <g transform="translate(398 112)">
    <text x="0" y="0" fill="#0f172a" font-size="33" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="850">让 Mac 版 Codex 更顺手</text>
    <text x="0" y="34" fill="#64748b" font-size="16" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">保留官方 Codex 使用方式，补齐中文界面、国产模型、小白工具箱和更新能力。</text>
  </g>

  <g transform="translate(398 186)">
    <rect width="218" height="128" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
    <text x="24" y="44" fill="#1d4ed8" font-size="21" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="850">中文界面</text>
    <text x="24" y="78" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">菜单、设置、报错、更新</text>
    <text x="24" y="102" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">提示统一中文表达。</text>
  </g>

  <g transform="translate(640 186)">
    <rect width="218" height="128" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
    <text x="24" y="44" fill="#0f766e" font-size="21" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="850">模型切换</text>
    <text x="24" y="78" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">Codex、DeepSeek、千问</text>
    <text x="24" y="102" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">和智谱按需切换。</text>
  </g>

  <g transform="translate(882 186)">
    <rect width="218" height="128" rx="18" fill="#f8fbff" stroke="#d8e7fb"/>
    <text x="24" y="44" fill="#7c3aed" font-size="21" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="850">多账号</text>
    <text x="24" y="78" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">查看套餐、额度和状态，</text>
    <text x="24" y="102" fill="#475569" font-size="14" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">快速切换桌面账号。</text>
  </g>

  <g transform="translate(398 342)">
    <rect width="702" height="112" rx="22" fill="#eef7ff" stroke="#bfdbfe"/>
    <rect x="28" y="28" width="176" height="56" rx="14" fill="#ffffff" stroke="#bdd7ff"/>
    <text x="48" y="54" fill="#1e40af" font-size="16" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="850">新手自动化引导</text>
    <text x="48" y="75" fill="#64748b" font-size="12" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">部署、域名、备案、开户</text>

    <circle cx="352" cy="56" r="23" fill="#2563eb"/>
    <text x="339" y="64" fill="#ffffff" font-size="18" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="900">AI</text>
    <path d="M222 56H318" stroke="#93c5fd" stroke-width="2" stroke-dasharray="7 7"/>
    <path d="M386 56H480" stroke="#93c5fd" stroke-width="2" stroke-dasharray="7 7"/>

    <rect x="500" y="28" width="174" height="56" rx="14" fill="#ffffff" stroke="#bbf7d0"/>
    <text x="524" y="54" fill="#047857" font-size="16" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif" font-weight="850">AiOpenTool</text>
    <text x="524" y="75" fill="#64748b" font-size="12" font-family="Inter, Segoe UI, Microsoft YaHei, sans-serif">问答推荐与工具箱联动</text>
  </g>
